<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SynapseFlow — Neuro Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root {
  --bg-deep: #0a0e17;
  --bg-panel: #131a2a;
  --bg-card: #0d1117;
  --border: #21262d;
  --border-active: #30363d;
  --text: #c9d1d9;
  --text-dim: #8b949e;
  --blue: #58a6ff;
  --green: #3fb950;
  --purple: #d2a8ff;
  --orange: #f0883e;
  --red: #f85149;
  --yellow: #d2991d;
  --teal: #7ee787;
}

body {
  background: var(--bg-deep);
  color: var(--text);
  font-family: 'Segoe UI', 'Cascadia Code', 'Consolas', system-ui, sans-serif;
  padding: 24px 28px;
  max-width: 1100px;
  margin: 0 auto;
  min-height: 100vh;
}

/* ── Header ─────────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.header h1 {
  color: var(--blue);
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.header .live-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: livePulse 1.5s infinite;
}
@keyframes livePulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.3); }
}
.header .live-tag {
  font-size: 11px;
  color: var(--green);
  margin-left: 6px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.sub {
  color: var(--text-dim);
  font-size: 13px;
  margin-bottom: 18px;
}

/* ── Panels ─────────────────────────────────── */
.panel {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 22px;
  margin-bottom: 14px;
  transition: border-color 0.3s;
}
.panel:hover { border-color: var(--border-active); }
.panel h2 {
  color: var(--teal);
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.panel h2 .count {
  background: var(--bg-card);
  color: var(--text-dim);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 400;
}

/* ── Brain Regions Grid ─────────────────────── */
.region-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
}
.region-card {
  background: var(--bg-card);
  border: 1px solid var(--border-active);
  border-radius: 10px;
  padding: 14px 16px;
  position: relative;
  transition: all 0.3s;
}
.region-card.active {
  border-color: var(--green);
  box-shadow: 0 0 12px rgba(63, 185, 80, 0.15);
}
.region-card .r-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}
.region-card .r-icon {
  font-size: 22px;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
  background: var(--bg-panel);
}
.region-card .r-name {
  color: var(--blue);
  font-size: 14px;
  font-weight: 700;
}
.region-card .r-desc {
  color: var(--text-dim);
  font-size: 12px;
  margin-bottom: 4px;
}
.region-card .r-models {
  color: var(--text-dim);
  font-size: 11px;
}
.region-card .r-status {
  position: absolute;
  top: 14px; right: 16px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 2px 8px;
  border-radius: 4px;
}
.r-status.idle { color: var(--text-dim); background: rgba(139,148,158,0.1); }
.r-status.active { color: var(--green); background: rgba(63,185,80,0.1); animation: statusGlow 2s infinite; }
@keyframes statusGlow {
  0%,100% { opacity: 0.8; }
  50% { opacity: 1; }
}

/* ── Execution Cards ────────────────────────── */
.exec-grid {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.exec-card {
  background: var(--bg-card);
  border: 1px solid var(--border-active);
  border-radius: 10px;
  padding: 12px 16px;
  min-width: 160px;
  flex: 1;
  position: relative;
  overflow: hidden;
}
.exec-card .e-region {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 2px;
}
.exec-card .e-model {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 4px;
}
.exec-card .e-status {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.status-running { color: var(--yellow); }
.status-done { color: var(--green); }
.status-pending { color: var(--text-dim); }
.status-failed { color: var(--red); }

/* Progress bar */
.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 8px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.4s ease;
}
.progress-running {
  background: var(--yellow);
  animation: barPulse 0.8s infinite;
  width: 60%;
}
.progress-done { background: var(--green); width: 100%; }
.progress-pending { background: var(--border-active); width: 5%; }
.progress-failed { background: var(--red); width: 100%; }
@keyframes barPulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.exec-card .e-meta {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 6px;
  display: flex;
  justify-content: space-between;
}

/* ── Stats Grid ─────────────────────────────── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border-active);
  border-radius: 10px;
  padding: 14px;
  text-align: center;
}
.stat-card .s-num {
  font-size: 28px;
  font-weight: 700;
  color: var(--blue);
  line-height: 1.2;
}
.stat-card .s-label {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 4px;
}

/* ── Event Log ──────────────────────────────── */
.log-container {
  background: var(--bg-card);
  border: 1px solid var(--border-active);
  border-radius: 8px;
  padding: 12px;
  max-height: 220px;
  overflow-y: auto;
  font-family: 'Cascadia Code', 'Consolas', 'Fira Code', monospace;
  font-size: 11px;
  line-height: 1.6;
}
.log-container::-webkit-scrollbar { width: 6px; }
.log-container::-webkit-scrollbar-track { background: transparent; }
.log-container::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 3px; }

.log-line { display: flex; gap: 10px; }
.log-ts { color: #484f58; white-space: nowrap; min-width: 70px; }
.log-info { color: var(--text-dim); }
.log-ok { color: var(--green); }
.log-err { color: var(--red); }
.log-warn { color: var(--yellow); }

/* ── Buttons ────────────────────────────────── */
.btn-row { margin-top: 12px; display: flex; gap: 8px; align-items: center; }
.btn {
  background: var(--green);
  color: #fff;
  border: none;
  padding: 8px 18px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: all 0.2s;
  font-family: inherit;
}
.btn:hover { background: #2ea043; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-ghost {
  background: var(--border);
  color: var(--text);
}
.btn-ghost:hover { background: var(--border-active); }

/* ── Footer ─────────────────────────────────── */
.footer {
  margin-top: 18px;
  text-align: center;
  font-size: 11px;
  color: var(--text-dim);
}
.footer .dot-connected { color: var(--green); }
.footer .dot-disconnected { color: var(--red); }

/* ── Empty State ────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 20px;
  color: var(--text-dim);
  font-size: 13px;
}
.empty-state .big-icon { font-size: 32px; margin-bottom: 8px; }

/* ── Responsive ─────────────────────────────── */
@media (max-width: 700px) {
  body { padding: 14px; }
  .region-grid { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(3, 1fr); }
  .exec-grid { flex-direction: column; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div>
    <h1>SynapseFlow</h1>
    <div class="sub">Neurosynaptic LLM Orchestration — Live Dashboard</div>
  </div>
  <div style="display:flex;align-items:center;">
    <div class="live-dot" id="liveDot"></div>
    <span class="live-tag" id="liveTag">LIVE</span>
  </div>
</div>

<!-- 6 Brain Regions -->
<div class="panel">
  <h2>🧠 6 Brain Regions <span class="count" id="activeCount">0 active</span></h2>
  <div class="region-grid" id="regions"></div>
</div>

<!-- Parallel AI Execution -->
<div class="panel">
  <h2>⚡ Parallel AI Execution — Live <span class="count" id="execCount">0 running</span></h2>
  <div id="execContainer">
    <div class="empty-state">
      <div class="big-icon">💤</div>
      <div>No active execution</div>
      <div style="font-size:11px;margin-top:4px;">Idle — ready for next query</div>
    </div>
  </div>
</div>

<!-- System Stats -->
<div class="panel">
  <h2>📊 System Stats</h2>
  <div class="stats-grid" id="stats"></div>
</div>

<!-- Event Log -->
<div class="panel">
  <h2>📜 Event Log <span class="count" id="logCount">0</span></h2>
  <div class="log-container" id="log"></div>
  <div class="btn-row">
    <button class="btn" id="btnDemo" onclick="runDemo()">▶ Run Demo</button>
    <button class="btn btn-ghost" onclick="fetchStatus()">↻ Refresh</button>
    <span style="font-size:11px;color:var(--text-dim);margin-left:auto;" id="pollInfo">Auto: 1.5s</span>
  </div>
</div>

<!-- Footer -->
<div class="footer">
  <span id="connStatus" class="dot-connected">● Connected</span> &nbsp;|&nbsp;
  Uptime: <span id="uptime">0s</span> &nbsp;|&nbsp;
  Brainstem: PythonBrainstem (HD-SDM)
</div>

<script>
// ═══════════════════════════════════════════════════════
// SynapseFlow Live Dashboard
// Polls /api/status every 1.5s for real-time updates
// ═══════════════════════════════════════════════════════

const API = '/api/status';
const POLL_MS = 1500;
let pollTimer = null;
let failCount = 0;

// ── Fetch Status ──────────────────────────────
async function fetchStatus() {
  try {
    const r = await fetch(API, { cache: 'no-store' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    failCount = 0;
    updateAll(data);
  } catch (e) {
    failCount++;
    if (failCount === 1) {
      document.getElementById('connStatus').innerHTML = '<span class="dot-disconnected">● Disconnected</span>';
      document.getElementById('liveDot').style.background = 'var(--red)';
      document.getElementById('liveDot').style.boxShadow = '0 0 8px var(--red)';
      document.getElementById('liveTag').textContent = 'OFFLINE';
      document.getElementById('liveTag').style.color = 'var(--red)';
    }
    console.debug('Poll failed:', e.message);
  }
}

// ── Update All UI ─────────────────────────────
function updateAll(data) {
  // Connection status
  document.getElementById('connStatus').innerHTML = '<span class="dot-connected">● Connected</span>';
  document.getElementById('liveDot').style.background = 'var(--green)';
  document.getElementById('liveDot').style.boxShadow = '0 0 8px var(--green)';
  document.getElementById('liveTag').textContent = 'LIVE';
  document.getElementById('liveTag').style.color = 'var(--green)';
  document.getElementById('uptime').textContent = formatUptime(data.uptime || 0);

  renderRegions(data.regions || []);
  renderExecutions(data.executions || []);
  renderStats(data.stats || {});
  renderLog(data.events || []);

  // Demo button state
  document.getElementById('btnDemo').disabled = data.demo_running;
}

// ── Render Brain Regions ──────────────────────
function renderRegions(regions) {
  const el = document.getElementById('regions');
  let activeN = 0;

  el.innerHTML = regions.map(r => {
    if (r.active) activeN++;
    return `
      <div class="region-card ${r.active ? 'active' : ''}">
        <span class="r-status ${r.active ? 'active' : 'idle'}">${r.active ? 'ACTIVE' : 'idle'}</span>
        <div class="r-header">
          <span class="r-icon">${r.icon}</span>
          <span class="r-name" style="color:${r.color||'#58a6ff'}">${r.name}</span>
        </div>
        <div class="r-desc">${r.desc}</div>
        <div class="r-models">Primary: ${(r.primary||[]).join(', ')}</div>
        ${r.active ? '<div style="margin-top:8px;"><div class="progress-bar"><div class="progress-fill progress-running" style="width:70%"></div></div></div>' : ''}
      </div>`;
  }).join('');

  document.getElementById('activeCount').textContent = `${activeN} active`;
}

// ── Render Executions ─────────────────────────
function renderExecutions(execs) {
  const container = document.getElementById('execContainer');
  let runningN = 0;

  if (!execs || execs.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="big-icon">💤</div>
        <div>No active execution</div>
        <div style="font-size:11px;margin-top:4px;">Idle</div>
      </div>`;
    document.getElementById('execCount').textContent = '0 running';
    return;
  }

  execs.forEach(e => { if (e.status === 'running') runningN++; });

  container.innerHTML = `<div class="exec-grid">${execs.map(e => {
    const statusClass = `status-${e.status}`;
    const barClass = `progress-${e.status}`;
    return `
      <div class="exec-card">
        <div class="e-region">${e.region}</div>
        <div class="e-model" style="color:${e.color||'#e6edf3'}">${e.model}</div>
        <div class="e-status ${statusClass}">${e.status.toUpperCase()}</div>
        <div class="progress-bar">
          <div class="progress-fill ${barClass}"></div>
        </div>
        <div class="e-meta">
          <span>${e.elapsed||'...'}</span>
          <span>${e.output_len ? e.output_len+'c' : '...'}</span>
        </div>
      </div>`;
  }).join('')}</div>`;

  document.getElementById('execCount').textContent = `${runningN} running`;
}

// ── Render Stats ──────────────────────────────
function renderStats(stats) {
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="s-num">${stats.num_regions||6}</div><div class="s-label">Brain Regions</div></div>
    <div class="stat-card"><div class="s-num">${stats.num_models||8}</div><div class="s-label">AI Models</div></div>
    <div class="stat-card"><div class="s-num">${stats.num_plasticity||11}</div><div class="s-label">Plasticity Mech.</div></div>
    <div class="stat-card"><div class="s-num">${stats.num_papers||20}</div><div class="s-label">Papers</div></div>
    <div class="stat-card"><div class="s-num">${stats.num_langs||4}</div><div class="s-label">Languages</div></div>
    <div class="stat-card"><div class="s-num">${stats.avg_cost||'$0.20'}</div><div class="s-label">Avg Cost/Q</div></div>
  `;
}

// ── Render Event Log ──────────────────────────
function renderLog(events) {
  const el = document.getElementById('log');
  if (!events || events.length === 0) {
    el.innerHTML = '<div class="log-line"><span class="log-ts">--:--:--</span><span class="log-info">No events yet</span></div>';
    document.getElementById('logCount').textContent = '0';
    return;
  }

  el.innerHTML = events.slice(0, 60).map(e => {
    const cls = e.type === 'ok' ? 'log-ok' : e.type === 'err' ? 'log-err' : e.type === 'warn' ? 'log-warn' : 'log-info';
    return `<div class="log-line"><span class="log-ts">${e.ts}</span><span class="${cls}">${e.msg}</span></div>`;
  }).join('');

  document.getElementById('logCount').textContent = String(events.length);
}

// ── Run Demo ──────────────────────────────────
async function runDemo() {
  const btn = document.getElementById('btnDemo');
  btn.disabled = true;
  btn.textContent = '⏳ Running...';
  try {
    await fetch('/api/demo');
  } catch(e) {
    console.debug('Demo trigger failed:', e);
  }
  // Polling will pick up the demo events
  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = '▶ Run Demo';
  }, 15000); // Max demo duration
}

// ── Helpers ───────────────────────────────────
function formatUptime(sec) {
  if (sec < 60) return sec + 's';
  if (sec < 3600) return Math.floor(sec/60) + 'm ' + (sec%60) + 's';
  const h = Math.floor(sec/3600);
  const m = Math.floor((sec%3600)/60);
  return h + 'h ' + m + 'm';
}

// ── Init ──────────────────────────────────────
function init() {
  fetchStatus(); // Immediate first fetch
  pollTimer = setInterval(fetchStatus, POLL_MS);
  document.getElementById('pollInfo').textContent = `Auto: ${POLL_MS/1000}s`;
}

// Cleanup on page unload
window.addEventListener('beforeunload', () => {
  if (pollTimer) clearInterval(pollTimer);
});

// Start
init();
</script>
</body>
</html>
